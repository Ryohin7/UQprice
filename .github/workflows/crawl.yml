name: Weekly Uniqlo Crawler

on:
  schedule:
    # 台灣時間每週三、四、五早上 08:55 (UTC 00:55) 自動執行
    - cron: '55 0 * * 3,4,5'
  workflow_dispatch: # 支援手動在 GitHub 頁面點擊按鈕執行

jobs:
  crawl-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Crawler & Sync to Firestore
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_CRAWLER_EMAIL: ${{ secrets.VITE_CRAWLER_EMAIL }}
          VITE_CRAWLER_PASSWORD: ${{ secrets.VITE_CRAWLER_PASSWORD }}
        run: node crawl_all_men.cjs

      - name: Commit and Push Updated products.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/products.json
          git diff-index --quiet HEAD || (git commit -m "data: auto-update products.json from crawler" && git push)

